<html>
<head>
<title>ZzFX example audio player</title>
<meta http-equiv="content-type" content="text/html; charset=ISO-8859-1">

<script type="text/javascript" src="ZzFX/ZzFX.js"></script>
<script type="text/javascript" src="ZzFX/zzfx_generate.js"></script>
<script type="text/javascript" src="jgame/jgaudio.js"></script>

</head>
<body>
	Example ZzFX sound player, playing sounds from JSON sound definitions.
	<div id="playbuttons"></div>
<script type="module">

	var sounddefs = fetch("./sounddefs.json")
	.then(response => response.json())
	.then( sounddefs => {
		sounddefs.sounds.forEach( elem => { 
			console.log(elem);
			JGAudio.load(elem.name,buildPresetSound(elem.seed,elem.type).samples,true)
			document.getElementById("playbuttons").innerHTML += `<button onclick="JGAudio.play('${elem.name}')">Play ${elem.name}</button><br>\n`
		});
	});
</script>
</body>
</html>
